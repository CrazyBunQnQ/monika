version: '3'

includes:
  common: ../Taskfile.yml

vars:
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Builds the application for Windows
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          DEV: '{{.DEV}}'
          BUILD_FLAGS: '{{.BUILD_FLAGS}}'
      - task: generate:icon
    cmds:
      - go build {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l" -ldflags="-X monika/internal/version.Version=dev -X monika/internal/version.CommitSHA={{.COMMIT_SHA | default "unknown"}} -X monika/internal/version.BuildTime={{.BUILD_TIME | default "unknown"}} -X monika/internal/version.RepoOwner={{.REPO_OWNER | default "unknown"}} -X monika/internal/version.RepoName={{.REPO_NAME | default "unknown"}}"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui -X monika/internal/version.Version={{.VERSION | default "0.0.0"}} -X monika/internal/version.CommitSHA={{.COMMIT_SHA | default "unknown"}} -X monika/internal/version.BuildTime={{.BUILD_TIME | default "unknown"}} -X monika/internal/version.RepoOwner={{.REPO_OWNER | default "unknown"}} -X monika/internal/version.RepoName={{.REPO_NAME | default "unknown"}}"{{end}}'
    env:
      GOOS: windows

  generate:icon:
    summary: Generates application icon and Windows resources
    sources:
      - winres/gen_icon.go
    generates:
      - winres/icon.ico
      - rsrc_windows_amd64.syso
    cmds:
      - bash -c 'cd winres && go run gen_icon.go'
      - go-winres make

  package:
    summary: Packages a production build
    cmds:
      - task: build

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
