# Alembic SQLite Configuration for Monika

[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Database URL - will be overridden by DB_TYPE env variable
# sqlalchemy.url = driver://user:pass@localhost/dbname
# For SQLite, we set it programmatically in alembic/env.py

# Version repository location
version_locations = %(here)s/alembic_versions

# Output encoding
output_encoding = utf-8

# Version path separator (default: use 'os')
version_path_separator = os

# Version table name
version_table = alembic_version

# Timezone
timezone =

# max length of characters to apply to "slug" field
truncate_slug_length = 40

# Set to 'true' to run source files in version path
# sourceless = false
