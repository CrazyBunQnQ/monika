# Docker Compose Configuration
# Usage:
#   1. Copy .env.production to .env
#   2. Configure your settings in .env
#   3. Run: docker-compose up -d
#
# Optional: Override port (if 80 is already in use)
#   export HTTP_PORT=8080
#   docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: monika-postgres
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${DB_NAME:-monika}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monika-network

  # Database Migration Service
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monika-migration
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monika}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key-for-migrations}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo "Waiting for database..."
        until python -c "import psycopg2; psycopg2.connect(host='$${DB_HOST}', port='$${DB_PORT}', user='$${DB_USER}', password='$${DB_PASSWORD}', dbname='$${DB_NAME}')" 2>/dev/null; do
          echo "PostgreSQL is unavailable - sleeping"
          sleep 2
        done
        echo "Database is ready!"
        echo "Running migrations..."
        alembic upgrade head
        echo "Migrations complete!"
    networks:
      - monika-network
    restart: "no"  # Run once and exit

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monika-backend
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monika}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Security
      SECRET_KEY: ${SECRET_KEY}
      # Application
      DEBUG: ${DEBUG:-false}
      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - monika-network

  # Frontend Builder (builds static files)
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile.builder
      target: builder
    container_name: monika-frontend-builder
    volumes:
      - frontend_static:/app/dist
    networks:
      - monika-network
    restart: "no"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: monika-nginx
    volumes:
      # Mount static files from frontend builder
      - frontend_static:/usr/share/nginx/html:ro
      # Custom nginx configuration
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (optional, for HTTPS)
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    ports:
      - "${HTTP_PORT:-80}:80"
      # - "443:443"  # Uncomment for HTTPS
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - monika-network

volumes:
  postgres_data:
    driver: local
  frontend_static:
    driver: local

networks:
  monika-network:
    driver: bridge
