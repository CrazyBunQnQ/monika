name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.78

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate Wails bindings
        run: |
          wails3 generate bindings -ts
          node -e "require('fs').copyFileSync('build/barrel_index.ts','frontend/bindings/monika/index.ts')"

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PRODUCTION: 'true'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        run: go-winres make

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        shell: bash
        run: |
          LDFLAGS="-w -s -H windowsgui"
          LDFLAGS="$LDFLAGS -X monika/internal/version.Version=${{ steps.version.outputs.version }}"
          LDFLAGS="$LDFLAGS -X monika/internal/version.CommitSHA=${{ github.sha }}"
          LDFLAGS="$LDFLAGS -X monika/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="$LDFLAGS -X monika/internal/version.RepoOwner=${{ github.repository_owner }}"
          LDFLAGS="$LDFLAGS -X monika/internal/version.RepoName=monika"
          go build \
            -tags production \
            -trimpath \
            -ldflags="$LDFLAGS" \
            -o bin/monika.exe

      - name: Package (zip)
        shell: pwsh
        run: |
          cd bin
          Compress-Archive -Path monika.exe -DestinationPath monika_windows_amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monika_windows_amd64.zip
          path: bin/monika_windows_amd64.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            echo "⚙️ This is the first release." >> release_notes.md
            echo "" >> release_notes.md
            COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || true)
          else
            RANGE="$PREV_TAG..HEAD"
            echo "📦 Changes from ${PREV_TAG} to ${{ steps.version.outputs.tag }}" >> release_notes.md
            echo "" >> release_notes.md
            COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || true)
          fi

          # Categorize commits by conventional commit type
          FEATS=""
          FIXES=""
          DOCS=""
          REFACTOR=""
          PERF=""
          OTHER=""

          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if echo "$commit" | grep -qiE "^feat(\(.+\))?!?:"; then
              MSG=$(echo "$commit" | sed -r 's/^feat(\(.+\))?!?:\s*//i')
              FEATS="$FEATS\n- $MSG"
            elif echo "$commit" | grep -qiE "^fix(\(.+\))?!?:"; then
              MSG=$(echo "$commit" | sed -r 's/^fix(\(.+\))?!?:\s*//i')
              FIXES="$FIXES\n- $MSG"
            elif echo "$commit" | grep -qiE "^docs(\(.+\))?!?:"; then
              MSG=$(echo "$commit" | sed -r 's/^docs(\(.+\))?!?:\s*//i')
              DOCS="$DOCS\n- $MSG"
            elif echo "$commit" | grep -qiE "^refactor(\(.+\))?!?:"; then
              MSG=$(echo "$commit" | sed -r 's/^refactor(\(.+\))?!?:\s*//i')
              REFACTOR="$REFACTOR\n- $MSG"
            elif echo "$commit" | grep -qiE "^perf(\(.+\))?!?:"; then
              MSG=$(echo "$commit" | sed -r 's/^perf(\(.+\))?!?:\s*//i')
              PERF="$PERF\n- $MSG"
            else
              OTHER="$OTHER\n- $commit"
            fi
          done <<< "$COMMITS"

          if [ -n "$FEATS" ]; then
            echo "### 🚀 New Features" >> release_notes.md
            echo -e "$FEATS" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> release_notes.md
            echo -e "$FIXES" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$REFACTOR" ]; then
            echo "### ♻️ Refactoring" >> release_notes.md
            echo -e "$REFACTOR" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$PERF" ]; then
            echo "### ⚡ Performance" >> release_notes.md
            echo -e "$PERF" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$DOCS" ]; then
            echo "### 📝 Documentation" >> release_notes.md
            echo -e "$DOCS" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$OTHER" ]; then
            echo "### 🔧 Other Changes" >> release_notes.md
            echo -e "$OTHER" >> release_notes.md
            echo "" >> release_notes.md
          fi

          # Append full changelog link
          if [ -n "$PREV_TAG" ]; then
            echo "---" >> release_notes.md
            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}" >> release_notes.md
          fi

          # Save to GITHUB_OUTPUT using heredoc to preserve newlines
          {
            echo "body<<EOF"
            cat release_notes.md
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**/*.zip
