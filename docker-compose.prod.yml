# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # PostgreSQL with production settings
  postgres:
    image: postgres:16-alpine
    container_name: monika-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME:-monika}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - monika-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Database Migration Service
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monika-migration-prod
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monika}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo "Waiting for database..."
        until pg_isready -h postgres -U postgres > /dev/null 2>&1; do
          echo "PostgreSQL is unavailable - sleeping"
          sleep 2
        done
        echo "Database is ready!"
        echo "Running migrations..."
        alembic upgrade head
        echo "Migrations complete!"
    networks:
      - monika-network
    restart: "no"

  # Backend with production settings
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monika-backend-prod
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monika}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # Security
      SECRET_KEY: ${SECRET_KEY}
      # Application
      DEBUG: "false"
      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      - monika-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # Frontend Builder (builds static files once)
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile.builder
      target: builder
    container_name: monika-frontend-builder-prod
    volumes:
      - frontend_static_prod:/app/dist
    networks:
      - monika-network
    restart: "no"  # Only runs to build, then exits

  # Nginx Reverse Proxy (serves static files + proxies API)
  nginx:
    image: nginx:alpine
    container_name: monika-nginx-prod
    volumes:
      # Mount static files from frontend builder
      - frontend_static_prod:/usr/share/nginx/html:ro
      # Custom nginx configuration
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (uncomment for HTTPS)
      # - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    networks:
      - monika-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0755
      - /var/run
      - /tmp
      - /var/log/nginx

volumes:
  postgres_data_prod:
    driver: local
    # Production: consider using named volumes with driver options for backup
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /path/to/postgres/data
  frontend_static_prod:
    driver: local

networks:
  monika-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: monika-br0
